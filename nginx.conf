server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Gzip — text/html ya está incluido por defecto en nginx, no declararlo de nuevo
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/css
        text/plain
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # HTML — sin cache para recibir siempre la ultima version
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # Imagenes y SVG — cache de 1 año (usan query string ?v= para invalidar)
    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fuentes y JS
    location ~* \.(woff|woff2|ttf|eot|js|css)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Ruta raiz
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ocultar version de nginx en headers
    server_tokens off;
}
